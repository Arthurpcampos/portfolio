<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JAVA FIGHTER II: UNIQUE ARCADE</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --red: #ff3131; --blue: #00d2ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; font-family: 'Press Start 2P', cursive; color: white; overflow: hidden; user-select: none; }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: rgba(0,0,0,0.9); }
        .active { display: flex; }
        
        #start-screen { background: radial-gradient(circle, #220033 0%, #000 100%); }
        .title-box { background: rgba(0,0,0,0.8); padding: 40px; border: 4px solid var(--gold); box-shadow: 0 0 30px var(--blue); text-align: center; }
        .title { font-size: 45px; color: #fff; text-shadow: 5px 5px var(--blue); margin-bottom: 20px; }

        /* GRIDS DE SELEÇÃO */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .card { position: relative; width: 180px; height: 200px; border: 4px solid #444; cursor: pointer; transition: 0.2s; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 10px; }
        .card:hover { border-color: var(--gold); transform: scale(1.1); background: #333; z-index: 10; }
        .card-canvas { width: 100%; height: 120px; background: #111; border: 2px solid #000; image-rendering: pixelated; }
        .card h3 { font-size: 12px; margin-top: 5px; color: #fff; text-align: center; }
        .card p { font-size: 8px; color: var(--blue); text-align: center; }

        /* HUD */
        #hud { position: absolute; top: 0; width: 100%; display: none; justify-content: space-between; padding: 30px 50px; z-index: 50; }
        .health-slot { width: 40%; }
        .bar-bg { height: 35px; background: #222; border: 4px solid #fff; box-shadow: 0 0 10px #000; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.2s; }
        #hp-p1 { background: linear-gradient(to bottom, #00ff00, #005500); float: right; }
        #hp-p2 { background: linear-gradient(to bottom, #ff0000, #550000); }
        
        #ko-overlay { position: absolute; top: 35%; width: 100%; text-align: center; font-size: 100px; color: #fff; display: none; z-index: 200; text-shadow: 6px 6px #ff0000; font-style: italic; }

        .btn { padding: 15px 30px; border: 4px solid #fff; background: #004e92; color: #fff; cursor: pointer; font-family: inherit; margin: 10px; }
        .btn:hover { background: var(--red); }
        canvas#game { display: block; image-rendering: pixelated; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <div class="title-box">
            <h1 class="title">JAVA FIGHTER II<br><span style="font-size: 18px; color: var(--gold);">UNIQUE ROSTER</span></h1>
            <button class="btn" onclick="showSelect()">INSERT COIN</button>
        </div>
    </div>

    <div id="select-screen" class="screen">
        <h2>SELECT YOUR FIGHTER</h2>
        <div class="grid" id="char-grid"></div>
    </div>

    <div id="arena-screen" class="screen">
        <h2>CHOOSE BATTLEGROUND</h2>
        <div class="grid" id="arena-grid" style="grid-template-columns: repeat(5, 1fr);"></div>
    </div>

    <div id="result-screen" class="screen">
        <h1 id="winner-text" style="font-size: 50px; color: var(--gold); margin-bottom: 40px;">WINNER</h1>
        <div>
            <button class="btn" onclick="location.reload()">MAIN MENU</button>
        </div>
    </div>

    <div id="hud">
        <div class="health-slot">
            <div id="name1" style="margin-bottom: 10px; color: #fff;">P1</div>
            <div class="bar-bg"><div id="hp-p1" class="bar-fill"></div></div>
        </div>
        <div id="round-txt" style="font-size: 25px; margin-top: 10px; color: var(--gold); text-shadow: 2px 2px #000;">ROUND 1</div>
        <div class="health-slot">
            <div id="name2" style="margin-bottom: 10px; text-align: right; color: #fff;">CPU</div>
            <div class="bar-bg"><div id="hp-p2" class="bar-fill"></div></div>
        </div>
    </div>

    <div id="ko-overlay">K.O.</div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let gameState = 'MENU';
        let p1, p2, activeStage;
        let p1Wins = 0, p2Wins = 0, round = 1;
        let shake = 0;

        // PERSONAGENS (Diferentes Tipos)
        const fighters = [
            { id: 'human', name: 'RYU-JAVA', color1: '#ffffff', color2: '#ff0000', skin: '#ffcc99', desc: 'CLASSIC FIGHTER' },
            { id: 'robot', name: 'MECHA-K', color1: '#778899', color2: '#ffff00', skin: '#444444', desc: 'HEAVY ARMOR' },
            { id: 'ninja', name: 'NINJA-VOID', color1: '#222222', color2: '#ff00ff', skin: '#ffcc99', desc: 'FAST ASSASSIN' },
            { id: 'beast', name: 'BEAST-BYTE', color1: '#006600', color2: '#003300', skin: '#00aa00', desc: 'BRUTE FORCE' },
            { id: 'slime', name: 'SLIME-C', color1: '#00ffff', color2: '#008888', skin: '#00ffff', desc: 'TOXIC BODY' },
            { id: 'lady', name: 'LADY-LOGIC', color1: '#ff66b2', color2: '#ffffff', skin: '#ffcc99', desc: 'SWIFT KICKS' }
        ];

        // MAPAS
        const stages = [
            { name: 'TEMPLE', type: 'temple', skyTop: '#ff4400', skyBot: '#ffaa00', floor: '#4d2600' },
            { name: 'CITY', type: 'city', skyTop: '#000022', skyBot: '#330044', floor: '#1a1a2e' },
            { name: 'ICE', type: 'ice', skyTop: '#aaeeff', skyBot: '#ffffff', floor: '#e6f2ff' },
            { name: 'SEWER', type: 'sewer', skyTop: '#002200', skyBot: '#004400', floor: '#113311' },
            { name: 'VOLCANO', type: 'volcano', skyTop: '#330000', skyBot: '#aa0000', floor: '#220000' }
        ];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            if(id !== 'none') document.getElementById(id).classList.add('active');
        }

        // --- SISTEMA DE GERAÇÃO DE FOTOS ---
        function showSelect() {
            showScreen('select-screen');
            const grid = document.getElementById('char-grid');
            grid.innerHTML = '';
            fighters.forEach(f => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<canvas class="card-canvas" width="100" height="120"></canvas>
                                 <h3>${f.name}</h3><p>${f.desc}</p>`;
                div.onclick = () => { p1Data = f; showStageSelect(); };
                grid.appendChild(div);
                
                // Desenha a foto no mini canvas
                const miniCtx = div.querySelector('canvas').getContext('2d');
                drawFighterShape(miniCtx, f, 50, 90, 1, 0, 'idle');
            });
        }

        function showStageSelect() {
            showScreen('arena-screen');
            const grid = document.getElementById('arena-grid');
            grid.innerHTML = '';
            stages.forEach(s => {
                const div = document.createElement('div');
                div.className = 'card';
                div.style.width = '140px';
                div.innerHTML = `<canvas class="card-canvas" width="120" height="80"></canvas>
                                 <h3>${s.name}</h3>`;
                div.onclick = () => { activeStage = s; startFight(); };
                grid.appendChild(div);

                // Desenha a foto do mapa
                const miniCtx = div.querySelector('canvas').getContext('2d');
                drawStageBackground(miniCtx, s, 120, 80);
            });
        }

        function startFight() {
            showScreen('none');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            document.getElementById('hud').style.display = 'flex';
            
            p2Data = fighters[Math.floor(Math.random()*fighters.length)];
            document.getElementById('name1').innerText = p1Data.name;
            document.getElementById('name2').innerText = p2Data.name;

            p1 = { x: 200, y: canvas.height - 350, w: 100, h: 220, data: p1Data, dir: 1, hp: 100, vy: 0, jumping: false, state: 'idle', frame: 0 };
            p2 = { x: canvas.width - 300, y: canvas.height - 350, w: 100, h: 220, data: p2Data, dir: -1, hp: 100, vy: 0, jumping: false, state: 'idle', frame: 0 };
            
            gameState = 'FIGHT';
            requestAnimationFrame(gameLoop);
        }

        const keys = {};
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        function gameLoop() {
            if(gameState === 'MENU') return;
            if(shake > 0) shake *= 0.85;

            if(gameState === 'FIGHT') {
                handleInput();
                applyPhysics(p1); applyPhysics(p2);
                aiLogic();
            }

            drawScene();
            requestAnimationFrame(gameLoop);
        }

        function handleInput() {
            if(keys['KeyA'] && p1.x > 50) { p1.x -= 8; p1.state = 'walk'; }
            else if(keys['KeyD'] && p1.x < canvas.width - 150) { p1.x += 8; p1.state = 'walk'; }
            else p1.state = 'idle';

            if(keys['KeyW'] && !p1.jumping) { p1.vy = -22; p1.jumping = true; }
            if(keys['KeyJ'] || keys['KeyK']) doAttack(p1, p2);
        }

        function aiLogic() {
            const dist = p2.x - p1.x;
            if(dist > 180) { p2.x -= 5; p2.state = 'walk'; }
            else if(dist < -180) { p2.x += 5; p2.state = 'walk'; }
            else { p2.state = 'idle'; if(Math.random() < 0.05) doAttack(p2, p1); }
        }

        function applyPhysics(p) {
            p.y += p.vy; p.vy += 1.2;
            if(p.y > canvas.height - 350) { p.y = canvas.height - 350; p.jumping = false; p.vy = 0; }
            p.frame += 0.15;
        }

        function doAttack(a, t) {
            if(a.state === 'punch') return;
            a.state = 'punch';
            const hit = Math.abs(a.x - t.x) < 200 && Math.abs(a.y - t.y) < 150;
            if(hit) {
                t.hp -= 15; shake = 25;
                document.getElementById('hp-p1').style.width = Math.max(0, p1.hp) + "%";
                document.getElementById('hp-p2').style.width = Math.max(0, p2.hp) + "%";
                if(t.hp <= 0) triggerKO();
            }
            setTimeout(() => { if(a.state === 'punch') a.state = 'idle'; }, 300);
        }

        function triggerKO() {
            gameState = 'KO';
            document.getElementById('ko-overlay').style.display = 'block';
            setTimeout(() => {
                document.getElementById('ko-overlay').style.display = 'none';
                if(p1.hp <= 0) p2Wins++; else p1Wins++;
                if(p1Wins === 2 || p2Wins === 2) showScreen('result-screen');
                else nextRound();
            }, 3000);
        }

        function nextRound() {
            round++; document.getElementById('round-txt').innerText = "ROUND " + round;
            p1.hp = 100; p2.hp = 100; p1.x = 200; p2.x = canvas.width - 300;
            document.getElementById('hp-p1').style.width = "100%"; document.getElementById('hp-p2').style.width = "100%";
            gameState = 'FIGHT';
        }

        // --- DESENHO DOS MAPAS ---
        function drawStageBackground(c, stageData, w, h) {
            let sky = c.createLinearGradient(0, 0, 0, h);
            sky.addColorStop(0, stageData.skyTop); sky.addColorStop(1, stageData.skyBot);
            c.fillStyle = sky; c.fillRect(0, 0, w, h);

            if(stageData.type === 'temple') {
                c.fillStyle = '#ff3300'; c.beginPath(); c.arc(w/2, h/2, w/4, 0, Math.PI*2); c.fill();
                c.fillStyle = '#2a1500'; c.beginPath(); c.moveTo(0, h); c.lineTo(w/3, h/2); c.lineTo(w, h); c.fill();
            } else if(stageData.type === 'city') {
                c.fillStyle = '#ffffaa'; c.beginPath(); c.arc(w/4, h/3, w/10, 0, Math.PI*2); c.fill();
                c.fillStyle = '#0f0f1a';
                for(let i=0; i<8; i++) { c.fillRect(i*w/8, h/2 + Math.random()*h/4, w/8+2, h); }
            } else if(stageData.type === 'ice') {
                c.fillStyle = '#ffffff'; c.beginPath(); c.moveTo(0, h); c.lineTo(w/4, h/2); c.lineTo(w/2, h); c.fill();
                c.fillStyle = '#ccffff'; c.beginPath(); c.moveTo(w/2, h); c.lineTo(w*0.8, h/2); c.lineTo(w, h); c.fill();
            } else if(stageData.type === 'sewer') {
                c.fillStyle = '#334433'; c.fillRect(w/4, 0, w/10, h); c.fillRect(w*0.7, 0, w/10, h); // Canos
                c.fillStyle = '#00ff00'; c.globalAlpha = 0.3; c.fillRect(0, h*0.6, w, h); c.globalAlpha = 1; // Água tóxica
            } else if(stageData.type === 'volcano') {
                c.fillStyle = '#ff8800'; c.beginPath(); c.moveTo(0, h); c.lineTo(w/2, h/3); c.lineTo(w, h); c.fill();
                c.fillStyle = '#ffff00'; c.fillRect(w/2 - 10, h/3, 20, h); // Lava descendo
            }
            c.fillStyle = stageData.floor; c.fillRect(0, h - h/5, w, h/5);
        }

        function drawScene() {
            ctx.save(); ctx.translate(Math.random()*shake, Math.random()*shake);
            drawStageBackground(ctx, activeStage, canvas.width, canvas.height);
            drawFighterShape(ctx, p1.data, p1.x + p1.w/2, p1.y + p1.h, p1.dir, p1.frame, p1.state);
            drawFighterShape(ctx, p2.data, p2.x + p2.w/2, p2.y + p2.h, p2.dir, p2.frame, p2.state);
            ctx.restore();
        }

        // --- DESENHO DOS PERSONAGENS CRIATIVOS ---
        function drawFighterShape(c, data, x, y, dir, frame, state) {
            c.save(); c.translate(x, y); if(dir === -1) c.scale(-1, 1);
            let b = (state === 'idle' || state === 'walk') ? Math.sin(frame) * 4 : 0;
            let w = (state === 'walk') ? Math.sin(frame * 2) * 15 : 0;
            let punch = (state === 'punch');

            // Sombra
            c.fillStyle = 'rgba(0,0,0,0.5)'; c.beginPath(); c.ellipse(0, 0, 40, 10, 0, 0, Math.PI*2); c.fill();

            if(data.id === 'human') {
                c.fillStyle = '#111'; c.fillRect(15, -60+b, 20, 60); // Braço trás
                c.fillStyle = '#111'; c.fillRect(-25+w, -80, 25, 80); // Perna trás
                c.fillStyle = data.color1; c.fillRect(-35, -150+b, 70, 90); // Corpo
                c.fillStyle = data.color2; c.fillRect(-40, -70+b, 80, 15); // Faixa
                c.fillStyle = data.color1; c.fillRect(5-w, -80, 25, 80); // Perna frente
                c.fillStyle = data.skin; c.fillRect(-25, -200+b, 50, 50); // Cabeça
                c.fillStyle = data.color2; c.fillRect(-30, -195+b, 60, 10); // Bandana
                if(punch) { c.fillStyle = data.color1; c.fillRect(0, -130+b, 80, 25); c.fillStyle=data.skin; c.fillRect(80,-130+b, 20,25); } 
                else { c.fillStyle = data.color1; c.fillRect(-10, -130+b, 25, 45); }
            
            } else if(data.id === 'robot') {
                c.fillStyle = data.color1; c.fillRect(-50, -180+b, 100, 120); // Corpo Quadrado
                c.fillStyle = data.color2; c.beginPath(); c.arc(0, -140+b, 20, 0, Math.PI*2); c.fill(); // Olho
                c.fillStyle = '#333'; c.fillRect(-30+w, -60, 25, 60); c.fillRect(10-w, -60, 25, 60); // Pernas grossas
                if(punch) { c.fillStyle = data.color1; c.fillRect(40, -150+b, 100, 40); } // Soco robótico
                else { c.fillStyle = data.color1; c.fillRect(20, -120+b, 30, 60); }
            
            } else if(data.id === 'ninja') {
                c.fillStyle = data.color1; c.fillRect(-20, -140+b, 40, 80); // Corpo fino
                c.fillStyle = data.color2; c.fillRect(-60, -130+b+w, 50, 15); // Cachecol ao vento
                c.fillStyle = data.color1; c.fillRect(-15+w, -60, 15, 60); c.fillRect(5-w, -60, 15, 60); // Pernas
                c.fillStyle = data.color1; c.beginPath(); c.arc(0, -160+b, 25, 0, Math.PI*2); c.fill(); // Cabeça
                c.fillStyle = data.skin; c.fillRect(-10, -165+b, 25, 10); // Olhos aparecendo
                if(punch) { c.fillStyle = data.color1; c.fillRect(10, -130+b, 80, 15); } // Soco rápido
                else { c.fillStyle = data.color1; c.fillRect(-5, -120+b, 15, 40); }
            
            } else if(data.id === 'beast') {
                c.fillStyle = data.color1; c.beginPath(); c.ellipse(0, -120+b, 70, 60, 0, 0, Math.PI*2); c.fill(); // Corcunda
                c.fillStyle = data.color2; c.fillRect(-40+w, -60, 30, 60); c.fillRect(10-w, -60, 30, 60); // Pernas de besta
                c.fillStyle = data.skin; c.fillRect(30, -160+b, 40, 40); // Cabeça pra frente
                c.fillStyle = '#fff'; c.beginPath(); c.moveTo(50, -160+b); c.lineTo(40, -190+b); c.lineTo(60, -160+b); c.fill(); // Chifre
                if(punch) { c.fillStyle = data.color1; c.fillRect(40, -100+b, 90, 40); } // Soco pesado
                else { c.fillStyle = data.color1; c.fillRect(20, -100+b, 40, 70); }
            
            } else if(data.id === 'slime') {
                c.fillStyle = data.color1; 
                c.beginPath(); c.ellipse(0, -50+b, 60+Math.abs(w), 50-b, 0, 0, Math.PI*2); c.fill(); // Base gosma
                c.beginPath(); c.ellipse(0, -120-b, 40, 60, 0, 0, Math.PI*2); c.fill(); // Topo gosma
                c.fillStyle = data.color2; c.beginPath(); c.arc(10, -140-b, 10, 0, Math.PI*2); c.fill(); // Olho boiando
                if(punch) { c.fillStyle = data.color1; c.beginPath(); c.ellipse(60, -80, 60, 20, 0, 0, Math.PI*2); c.fill(); } // Tentáculo
            
            } else if(data.id === 'lady') {
                c.fillStyle = data.color1; c.fillRect(-20, -140+b, 40, 70); // Corpo elegante
                c.fillStyle = data.color2; c.fillRect(-25+w, -70, 20, 70); c.fillRect(5-w, -70, 20, 70); // Pernas longas
                c.fillStyle = data.skin; c.beginPath(); c.arc(0, -160+b, 20, 0, Math.PI*2); c.fill(); // Cabeça
                c.fillStyle = data.color1; c.beginPath(); c.ellipse(-30, -150+b+w, 20, 10, -Math.PI/4, 0, Math.PI*2); c.fill(); // Rabo de cavalo
                if(punch) { c.fillStyle = data.color2; c.fillRect(10, -70, 90, 20); } // Chute longo
                else { c.fillStyle = data.skin; c.fillRect(-5, -120+b, 15, 35); }
            }
            c.restore();
        }
    </script>
</body>
</html>
