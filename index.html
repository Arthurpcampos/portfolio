<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JAVA FIGHTER II: ULTIMATE ARCADE</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --red: #ff3131; --blue: #00d2ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; font-family: 'Press Start 2P', cursive; color: white; overflow: hidden; }

        /* UI SCREENS */
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: rgba(0,0,0,0.9); transition: 0.5s; }
        .active { display: flex; }
        
        #start-screen { background: url('https://picsum.photos/id/1015/1200/800?blur=5') no-repeat center center/cover; }
        .title-box { background: rgba(0,0,0,0.7); padding: 40px; border: 4px solid var(--gold); box-shadow: 0 0 20px var(--gold); }
        .title { font-size: 40px; color: #fff; text-shadow: 4px 4px var(--red); margin-bottom: 20px; }

        /* CHARACTER SELECT */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .card { position: relative; width: 200px; height: 280px; border: 4px solid #444; overflow: hidden; cursor: pointer; transition: 0.3s; background: #222; }
        .card:hover { border-color: var(--gold); transform: translateY(-10px); }
        .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .card .info { position: absolute; bottom: 0; background: linear-gradient(transparent, #000); width: 100%; padding: 10px; font-size: 10px; }

        /* ARENA HUD */
        #hud { position: absolute; top: 0; width: 100%; display: none; justify-content: space-between; padding: 40px 60px; z-index: 50; }
        .health-slot { width: 40%; }
        .bar-bg { height: 35px; background: #333; border: 4px solid #fff; position: relative; overflow: hidden; skew: -10deg; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #hp-p1 { background: linear-gradient(to bottom, #00ff00, #004400); float: right; }
        #hp-p2 { background: linear-gradient(to bottom, #ff0000, #440000); }
        
        #ko-overlay { position: absolute; top: 35%; width: 100%; text-align: center; font-size: 100px; color: #fff; display: none; z-index: 200; text-shadow: 0 0 20px #ff0000; font-style: italic; pointer-events: none; }

        canvas { image-rendering: pixelated; display: block; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <div class="title-box">
            <h1 class="title">JAVA FIGHTER II<br><span style="font-size: 15px;">TURBO EDITION</span></h1>
            <button class="btn" onclick="showSelect()" style="padding: 15px 40px; cursor: pointer; font-family: inherit;">[ PUSH START ]</button>
        </div>
    </div>

    <div id="select-screen" class="screen">
        <h2>SELECT YOUR WARRIOR</h2>
        <div class="grid" id="char-grid"></div>
    </div>

    <div id="arena-screen" class="screen">
        <h2>SELECT STAGE</h2>
        <div class="grid" id="arena-grid" style="grid-template-columns: 1fr 1fr;"></div>
    </div>

    <div id="result-screen" class="screen">
        <h1 id="winner-text" style="font-size: 50px; color: var(--gold);">WINNER</h1>
        <button class="btn" onclick="location.reload()" style="margin-top:20px; font-family: inherit; padding: 10px;">MAIN MENU</button>
        <button id="btn-port" class="btn" style="display:none; background:#22c55e; margin-top:20px; font-family: inherit; padding: 10px;" onclick="showPortfolio()">VIEW PORTFOLIO</button>
    </div>

    <div id="portfolio-screen" class="screen" style="text-align: left; align-items: flex-start; padding: 100px;">
        <h1 style="border-bottom: 5px solid #fff; width: 100%; padding-bottom: 20px;">ENGINEER_REPORT.EXE</h1>
        <div style="margin: 30px 0; border-left: 10px solid var(--blue); padding-left: 20px;">
            <h3>STACK: JAVA / KOTLIN</h3>
            <p>High-performance backend systems and logic architecture.</p>
        </div>
        <div style="margin: 30px 0; border-left: 10px solid var(--blue); padding-left: 20px;">
            <h3>GRAPHICS: HTML5 CANVAS / WEBGL</h3>
            <p>Creating immersive 2D/3D interactive experiences.</p>
        </div>
        <button onclick="location.reload()" style="font-family: inherit;">REBOOT</button>
    </div>

    <div id="hud">
        <div class="health-slot">
            <div id="name1" style="margin-bottom: 10px;">PLAYER</div>
            <div class="bar-bg"><div id="hp-p1" class="bar-fill"></div></div>
        </div>
        <div id="round-txt" style="font-size: 25px; margin-top: 10px; color: var(--gold);">ROUND 1</div>
        <div class="health-slot">
            <div id="name2" style="margin-bottom: 10px; text-align: right;">CPU</div>
            <div class="bar-bg"><div id="hp-p2" class="bar-fill"></div></div>
        </div>
    </div>

    <div id="ko-overlay">K.O.</div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let gameState = 'MENU';
        let p1, p2, stage;
        let p1Wins = 0, p2Wins = 0, round = 1;
        let shake = 0;

        const fighters = [
            { name: 'KODER', color: '#00ffcc', power: 'STATIC', img: 'https://picsum.photos/seed/kdr/300/500' },
            { name: 'JAVA', color: '#ff4400', power: 'BYTE', img: 'https://picsum.photos/seed/jav/300/500' },
            { name: 'VOID', color: '#555555', power: 'NULL', img: 'https://picsum.photos/seed/vid/300/500' },
            { name: 'PIXEL', color: '#ff00ff', power: 'GLITCH', img: 'https://picsum.photos/seed/pxl/300/500' },
            { name: 'BIT', color: '#ffff00', power: '8-BIT', img: 'https://picsum.photos/seed/bit/300/500' },
            { name: 'LOGIC', color: '#0044ff', power: 'BOOL', img: 'https://picsum.photos/seed/lgc/300/500' }
        ];

        const stages = [
            { name: 'TEMPLE', bg: '#2d1a00', img: 'https://picsum.photos/seed/stg1/800/400' },
            { name: 'NEON CITY', bg: '#00051a', img: 'https://picsum.photos/seed/stg2/800/400' }
        ];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            if(id !== 'none') document.getElementById(id).classList.add('active');
        }

        function showSelect() {
            showScreen('select-screen');
            const grid = document.getElementById('char-grid');
            grid.innerHTML = '';
            fighters.forEach(f => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<img src="${f.img}"><div class="info"><h3>${f.name}</h3><p>${f.power}</p></div>`;
                div.onclick = () => { p1Data = f; showStageSelect(); };
                grid.appendChild(div);
            });
        }

        function showStageSelect() {
            showScreen('arena-screen');
            const grid = document.getElementById('arena-grid');
            grid.innerHTML = '';
            stages.forEach(s => {
                const div = document.createElement('div');
                div.className = 'card'; div.style.width = '350px';
                div.innerHTML = `<img src="${s.img}"><div class="info"><h3>${s.name}</h3></div>`;
                div.onclick = () => { stage = s; startFight(); };
                grid.appendChild(div);
            });
        }

        function startFight() {
            showScreen('none');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            document.getElementById('hud').style.display = 'flex';
            
            p2Data = fighters[Math.floor(Math.random()*fighters.length)];
            document.getElementById('name1').innerText = p1Data.name;
            document.getElementById('name2').innerText = p2Data.name;

            p1 = createPlayer(200, p1Data.color, 1);
            p2 = createPlayer(canvas.width - 400, p2Data.color, -1);
            
            gameState = 'FIGHT';
            requestAnimationFrame(update);
        }

        function createPlayer(x, color, dir) {
            return {
                x, y: canvas.height - 450, w: 120, h: 300,
                color, dir, hp: 100, vy: 0, 
                jumping: false, attacking: false, 
                frame: 0, state: 'idle'
            };
        }

        const keys = {};
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        function update() {
            if(gameState === 'MENU') return;

            // Screen Shake Decay
            if(shake > 0) shake *= 0.9;

            if(gameState === 'FIGHT') {
                handleInput();
                applyPhysics(p1);
                applyPhysics(p2);
                aiLogic();
            }

            draw();
            requestAnimationFrame(update);
        }

        function handleInput() {
            if(keys['KeyA']) { p1.x -= 10; p1.state = 'walk'; }
            else if(keys['KeyD']) { p1.x += 10; p1.state = 'walk'; }
            else { p1.state = 'idle'; }

            if(keys['KeyW'] && !p1.jumping) { p1.vy = -25; p1.jumping = true; }
            if(keys['KeyJ'] || keys['KeyK']) attack(p1, p2);
        }

        function aiLogic() {
            const dist = p2.x - p1.x;
            if(dist > 180) p2.x -= 5;
            else if(Math.random() < 0.05) attack(p2, p1);
        }

        function applyPhysics(p) {
            p.y += p.vy;
            p.vy += 1.2;
            if(p.y > canvas.height - 450) {
                p.y = canvas.height - 450;
                p.jumping = false;
                p.vy = 0;
            }
            p.frame += 0.15;
        }

        function attack(a, t) {
            if(a.attacking) return;
            a.attacking = true;
            a.state = 'punch';
            
            const hit = Math.abs(a.x - t.x) < 200 && Math.abs(a.y - t.y) < 100;
            if(hit) {
                t.hp -= 10;
                shake = 15;
                document.getElementById('hp-p1').style.width = p1.hp + "%";
                document.getElementById('hp-p2').style.width = p2.hp + "%";
                if(t.hp <= 0) triggerKO();
            }

            setTimeout(() => { a.attacking = false; a.state = 'idle'; }, 200);
        }

        function triggerKO() {
            gameState = 'KO';
            document.getElementById('ko-overlay').style.display = 'block';
            setTimeout(() => {
                document.getElementById('ko-overlay').style.display = 'none';
                if(p1.hp <= 0) p2Wins++; else p1Wins++;
                if(p1Wins === 2 || p2Wins === 2) endMatch();
                else nextRound();
            }, 3000);
        }

        function nextRound() {
            round++;
            document.getElementById('round-txt').innerText = "ROUND " + round;
            p1.hp = 100; p2.hp = 100;
            p1.x = 200; p2.x = canvas.width - 400;
            updateHUD();
            gameState = 'FIGHT';
        }

        function updateHUD() {
            document.getElementById('hp-p1').style.width = "100%";
            document.getElementById('hp-p2').style.width = "100%";
        }

        function endMatch() {
            showScreen('result-screen');
            const txt = document.getElementById('winner-text');
            if(p1Wins > p2Wins) {
                txt.innerText = "PLAYER 1 VICTORIOUS";
                document.getElementById('btn-port').style.display = 'block';
            } else {
                txt.innerText = "CPU VICTORIOUS";
            }
        }

        function draw() {
            ctx.save();
            // Screen Shake Effect
            ctx.translate(Math.random()*shake, Math.random()*shake);

            // Background Parallax
            ctx.fillStyle = stage.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Floor
            const grad = ctx.createLinearGradient(0, canvas.height-150, 0, canvas.height);
            grad.addColorStop(0, '#333');
            grad.addColorStop(1, '#000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, canvas.height-150, canvas.width, 150);

            // Characters
            drawPlayer(p1);
            drawPlayer(p2);

            ctx.restore();
        }

        function drawPlayer(p) {
            ctx.save();
            ctx.translate(p.x + p.w/2, p.y + p.h/2);
            if(p.dir === -1) ctx.scale(-1, 1);

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.ellipse(0, p.h/2 + 20, 80, 20, 0, 0, Math.PI*2);
            ctx.fill();

            // Body Animation (Breathing/Idle)
            let bounce = Math.sin(p.frame) * 5;
            
            // Draw Character (Simplified High-End Look)
            ctx.fillStyle = p.color;
            // Torso
            ctx.fillRect(-40, -100 + bounce, 80, 120);
            // Head
            ctx.fillStyle = '#ffdbac';
            ctx.fillRect(-30, -160 + bounce, 60, 60);
            // Arms
            ctx.fillStyle = p.color;
            if(p.state === 'punch') {
                ctx.fillRect(20, -80, 100, 30); // Punching arm
            } else {
                ctx.fillRect(40, -80 + bounce, 30, 80); // Idle arm
            }
            
            // Legs
            ctx.fillRect(-35, 20, 30, 80);
            ctx.fillRect(5, 20, 30, 80);

            ctx.restore();
        }

        function showPortfolio() { showScreen('portfolio-screen'); }
    </script>
</body>
</html>
