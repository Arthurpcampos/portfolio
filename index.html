<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JAVA FIGHTER: ARCADE ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --red: #ff3131; --blue: #00d2ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Press Start 2P', cursive; color: white; overflow: hidden; }

        /* UI SCREENS */
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: rgba(0,0,0,0.95); }
        .active { display: flex; }
        
        #start-screen { background: radial-gradient(circle, #1a1a1a 0%, #000 100%); border: 10px double #333; }
        .title { font-size: 40px; text-align: center; line-height: 1.5; color: var(--gold); text-shadow: 4px 4px var(--red); }

        /* HUD */
        #hud { position: absolute; top: 0; width: 100%; display: none; justify-content: space-between; padding: 25px 40px; z-index: 50; }
        .p-box { width: 42%; }
        .bar-container { height: 25px; background: #222; border: 3px solid #fff; margin-bottom: 5px; position: relative; }
        .hp-fill { height: 100%; width: 100%; background: linear-gradient(to bottom, #00ff00, #006600); transition: width 0.1s; }
        .sp-fill { height: 8px; width: 0%; background: var(--blue); position: absolute; bottom: -12px; border: 1px solid #fff; transition: width 0.3s; }
        
        #ko-msg { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 80px; color: var(--red); display: none; z-index: 200; -webkit-text-stroke: 2px #fff; }

        /* PORTFOLIO */
        #portfolio { background: #050505; text-align: left; padding: 50px; }
        .skill-card { border-left: 5px solid var(--gold); padding: 15px; margin: 20px 0; background: #111; }

        canvas { image-rendering: pixelated; display: block; }
        .btn { padding: 15px 30px; border: 4px solid #fff; background: #d32f2f; color: white; cursor: pointer; font-family: inherit; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <h1 class="title">JAVA FIGHTER II<br><span style="font-size: 15px; color:#fff">STREET EDITION</span></h1>
        <button class="btn" onclick="initGame()">INSERT COIN</button>
    </div>

    <div id="result-screen" class="screen">
        <h1 id="res-title" style="font-size: 60px;">K.O.</h1>
        <div id="winner-info" style="margin: 20px 0;"></div>
        <button id="port-btn" class="btn" style="background: #2e7d32; display:none" onclick="showPortfolio()">VIEW PORTFOLIO</button>
        <button class="btn" onclick="location.reload()">RETRY</button>
    </div>

    <div id="portfolio" class="screen">
        <h2 style="color: var(--gold)">> SYSTEM ARCHITECT PORTFOLIO</h2>
        <div class="skill-card">
            <h3>BACKEND MASTER</h3>
            <p>Java Specialist: Spring Boot, Microservices, and Robust APIs.</p>
        </div>
        <div class="skill-card">
            <h3>ENGINEER</h3>
            <p>Graphics: High-performance 2D Engines & UI/UX Design.</p>
        </div>
        <button class="btn" onclick="location.reload()">CLOSE_SESSION</button>
    </div>

    <div id="hud">
        <div class="p-box">
            <div id="p1-name" style="margin-bottom:5px">PLAYER 1</div>
            <div class="bar-container"><div id="hp1" class="hp-fill"></div><div id="sp1" class="sp-fill"></div></div>
        </div>
        <div id="timer" style="font-size: 30px; color: var(--gold)">99</div>
        <div class="p-box" style="text-align: right;">
            <div id="p2-name" style="margin-bottom:5px">CPU</div>
            <div class="bar-container"><div id="hp2" class="hp-fill" style="float:right"></div><div id="sp2" class="sp-fill" style="right:0"></div></div>
        </div>
    </div>

    <div id="ko-msg">K.O.</div>
    <canvas id="stage"></canvas>

    <script>
        const canvas = document.getElementById('stage');
        const ctx = canvas.getContext('2d');
        let gameState = 'MENU';
        let shake = 0;
        let particles = [];
        let projectiles = [];

        // Configuração dos Lutadores
        const p1 = { 
            x: 150, y: 0, w: 80, h: 180, hp: 100, sp: 0, 
            color: '#fff', skin: '#ffcc99', pants: '#fff',
            dir: 1, vy: 0, jumping: false, state: 'idle', 
            frame: 0, lastHit: 0, blocking: false 
        };
        const p2 = { 
            x: 0, y: 0, w: 80, h: 180, hp: 100, sp: 0, 
            color: '#f00', skin: '#ffcc99', pants: '#f00',
            dir: -1, vy: 0, jumping: false, state: 'idle', 
            frame: 0, lastHit: 0, blocking: false 
        };

        const keys = {};
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        function initGame() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            p1.y = canvas.height - 280;
            p2.y = canvas.height - 280;
            p2.x = canvas.width - 250;
            document.getElementById('hud').style.display = 'flex';
            showScreen('none');
            gameState = 'FIGHT';
            requestAnimationFrame(loop);
        }

        function loop() {
            if(gameState === 'MENU') return;
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function update() {
            if(gameState !== 'FIGHT') return;

            // P1 Controls
            p1.blocking = keys['KeyS'];
            if(!p1.blocking) {
                if(keys['KeyA']) { p1.x -= 7; p1.state = 'walk'; p1.dir = -1; }
                else if(keys['KeyD']) { p1.x += 7; p1.state = 'walk'; p1.dir = 1; }
                else p1.state = 'idle';

                if(keys['KeyW'] && !p1.jumping) { p1.vy = -25; p1.jumping = true; }
            } else { p1.state = 'block'; }

            // Attacks
            if(keys['KeyJ']) attack(p1, p2, 'punch', 5, 10);
            if(keys['KeyK']) attack(p1, p2, 'kick', 8, 15);
            if(keys['KeyL'] && p1.sp >= 30) fireProjectile(p1);
            if(keys['KeyI'] && p1.sp >= 100) ultimateMove(p1, p2);

            // CPU AI
            const dist = Math.abs(p1.x - p2.x);
            if(dist > 150) { p2.x += (p1.x > p2.x ? 4 : -4); p2.state = 'walk'; }
            else { 
                p2.state = 'idle';
                if(Math.random() < 0.05) attack(p2, p1, 'punch', 5, 5);
            }

            physics(p1); physics(p2);
            updateProjectiles();
            if(shake > 0) shake *= 0.9;
        }

        function physics(p) {
            p.y += p.vy; p.vy += 1.5;
            if(p.y > canvas.height - 280) { p.y = canvas.height - 280; p.jumping = false; p.vy = 0; }
            p.frame += 0.15;
            // Bound
            if(p.x < 0) p.x = 0;
            if(p.x > canvas.width - p.w) p.x = canvas.width - p.w;
        }

        function attack(a, t, type, dmg, spGain) {
            if(a.state === 'punch' || a.state === 'kick') return;
            a.state = type;
            const reach = type === 'kick' ? 140 : 100;
            
            if(Math.abs(a.x - t.x) < reach && Math.abs(a.y - t.y) < 100) {
                let finalDmg = t.blocking ? dmg * 0.1 : dmg;
                t.hp -= finalDmg;
                a.sp = Math.min(100, a.sp + spGain);
                spawnParticles(t.x + 40, t.y + 50, t.blocking ? '#fff' : '#f00');
                shake = 10;
                updateHUD();
                if(t.hp <= 0) endGame(a === p1);
            }
            setTimeout(() => a.state = 'idle', 200);
        }

        function fireProjectile(p) {
            p.sp -= 30; updateHUD();
            projectiles.push({ x: p.x + (p.dir*50), y: p.y + 60, dir: p.dir, owner: p });
            p.state = 'punch';
            setTimeout(() => p.state = 'idle', 300);
        }

        function ultimateMove(p, t) {
            p.sp = 0; updateHUD();
            shake = 50;
            t.hp -= 40;
            spawnParticles(t.x, t.y, '#00d2ff');
            updateHUD();
            if(t.hp <= 0) endGame(p === p1);
        }

        function updateProjectiles() {
            projectiles.forEach((proj, i) => {
                proj.x += proj.dir * 15;
                const target = proj.owner === p1 ? p2 : p1;
                if(Math.abs(proj.x - target.x) < 50 && Math.abs(proj.y - target.y) < 100) {
                    target.hp -= 10;
                    projectiles.splice(i, 1);
                    updateHUD();
                }
                if(proj.x < 0 || proj.x > canvas.width) projectiles.splice(i, 1);
            });
        }

        function updateHUD() {
            document.getElementById('hp1').style.width = p1.hp + "%";
            document.getElementById('hp2').style.width = p2.hp + "%";
            document.getElementById('sp1').style.width = p1.sp + "%";
            document.getElementById('sp2').style.width = p2.sp + "%";
        }

        function spawnParticles(x, y, color) {
            for(let i=0; i<10; i++) particles.push({ x, y, vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20, life: 1, color });
        }

        function endGame(p1Wins) {
            gameState = 'END';
            document.getElementById('ko-msg').innerText = p1Wins ? "K.O." : "DEFEAT";
            document.getElementById('ko-msg').style.display = 'block';
            
            setTimeout(() => {
                showScreen('result-screen');
                document.getElementById('res-title').innerText = p1Wins ? "VICTORY" : "DEFEAT";
                if(p1Wins) document.getElementById('port-btn').style.display = 'block';
            }, 2000);
        }

        function draw() {
            ctx.save();
            ctx.translate(Math.random()*shake, Math.random()*shake);
            
            // Draw Stage
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#001133'); grad.addColorStop(1, '#003366');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#222'; ctx.fillRect(0, canvas.height-100, canvas.width, 100);
            ctx.strokeStyle = '#444'; ctx.lineWidth = 5; ctx.strokeRect(0, canvas.height-100, canvas.width, 5);

            // Draw Players
            drawFighter(p1);
            drawFighter(p2);

            // Draw Projectiles
            ctx.fillStyle = varColor('--blue');
            projectiles.forEach(proj => {
                ctx.beginPath(); ctx.arc(proj.x, proj.y, 20, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 20; ctx.shadowColor = '#00d2ff';
            });

            // Particles
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.05;
                if(p.life <= 0) particles.splice(i, 1);
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 8, 8);
            });
            ctx.globalAlpha = 1; ctx.restore();
        }

        function drawFighter(p) {
            ctx.save();
            ctx.translate(p.x + p.w/2, p.y + p.h/2);
            if(p.dir === -1) ctx.scale(-1, 1);

            let b = Math.sin(p.frame) * 5;

            // Body
            ctx.fillStyle = p.color; ctx.fillRect(-30, -80+b, 60, 100); // Shirt
            ctx.fillStyle = p.pants; ctx.fillRect(-30, 20, 60, 70); // Pants
            ctx.fillStyle = p.skin; ctx.fillRect(-25, -135+b, 50, 55); // Head

            // Arms based on state
            ctx.fillStyle = p.skin;
            if(p.state === 'punch') ctx.fillRect(20, -70, 80, 20);
            else if(p.state === 'kick') ctx.fillRect(20, 20, 90, 30);
            else if(p.state === 'block') ctx.fillRect(10, -90, 30, 80);
            else { ctx.fillRect(20, -60+b, 20, 60); ctx.fillRect(-40, -60+b, 20, 60); }

            ctx.restore();
        }

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            if(id !== 'none') document.getElementById(id).classList.add('active');
        }
        function showPortfolio() { showScreen('portfolio'); }
    </script>
</body>
</html>
